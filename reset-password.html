<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset-password-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="global-dark-mode.css">
</head>
<body>

    <div class="floating-bg">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>
<button id="dark-theme-toggle" class="dark-mode-toggle-btn" onclick="toggleAppTheme()">🌙</button>
    <div class="auth-overlay">
        <div class="auth-card reset-card">
            <h2 class="auth-title">নতুন পাসওয়ার্ড সেট করুন</h2>
            <p class="auth-subtitle">রিসেট লিংক থেকে এসে আপনার নতুন পাসওয়ার্ড দিন।</p>

            <div id="reset-status" class="reset-status">আপনার রিসেট লিংক যাচাই করা হচ্ছে...</div>

            <div class="auth-inputs">
                <div class="password-field">
                    <input type="password" id="new-password" placeholder="নতুন পাসওয়ার্ড">
                    <span class="toggle-password" data-target="new-password">👁️</span>
                </div>
                <div class="password-field">
                    <input type="password" id="confirm-password" placeholder="পাসওয়ার্ড নিশ্চিত করুন">
                    <span class="toggle-password" data-target="confirm-password">👁️</span>
                </div>
            </div>

            <button class="auth-main-btn" id="reset-submit" disabled>পাসওয়ার্ড আপডেট করুন</button>
            <p class="auth-footer">লগইন পেজে ফিরে যেতে <a href="home.html">এখানে ক্লিক করুন</a></p>
        </div>
    </div>
    
    <script src="reset-password.js"></script>
    <script src="global-theme-engine.js"></script>
</body>
</html>
